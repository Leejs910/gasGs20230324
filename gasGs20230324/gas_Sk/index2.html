<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Document</title>
    <!-- bootstrap -->
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <!-- resize -->

<body>
    <div class="row container2 m-3 p-1 justify-content-center w-100 rounded-3">
        <div class="w-100 space2" ></div>
        <div class="row text-center justify-content-center">
            <div class="contents_text col-md-6 text-start display-5 fw-bold m-1 align-self-center contents_text">주유를 하시기 전에<br>정전기패드에 손을<br>꼭 눌러 주세요.</div>
            <div class="card p-3 border-5 border-dark" style="width: 16rem;" onclick="Swal.fire({
                title: '터치완료',
                icon: 'success',
                text: '터치완료 되었습니다',
                backdrop: 'rgba(0,0,0,0.6)',
                confirmButtonColor: '#3085d6',
                confirmButtonText: '&nbsp&nbsp&nbsp 확 인 &nbsp&nbsp&nbsp',
                showClass: {popup: 'animate__animated animate__fadeInDown'},
                hideClass: {popup: 'animate__animated animate__fadeOutUp'},
            }).then((result) => 
              {if (result.isConfirmed) 
                { confirmText(1);
                    }
                })">
                <img src="img/handLogo.svg" class="card-img-top" alt="...">
            </div>
            <div class="w-1oo space"></div>
            <div class="h1 col-md-4 text-light p-3 bg-primary bg-gradient rounded-3 ok_bt" onclick="go_next(1)" >확 인</div>
        </div>
        <div class="w-100 space2" ></div>
                
            
    </div>
    <!-- bootstrap -->
    <script src="bootstrap/bootstrap.bundle.min.js"></script>
    <!-- sweetalert -->
    <script src="sweetalert2.js"></script>
    <!-- js -->
    <script src="script.js"></script>

</body>


<style>
    * {
        font-family: "pretendard", 'Roboto', sans-serif, Arial, Helvetica;
    }


    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        place-items: center;
        justify-content: center;
        align-items: center;

    .container2
    {
        border: solid 2px black;
        max-width: 1280px;
        background-color: rgb(232, 164, 161);
        background-image: url("./img/square.svg");
        background-repeat: repeat;
        background-size: 6rem;
    }

    .contents {
        
        background-color: aliceblue;
    }



    .sk {
        color: tomato;
    }

    .contents_bg2 {
    background-image: url("./img/handLogo.svg");

    background-position: center;
    }
   

    /* index2텍스트 외곽 */
    .contents_text{
