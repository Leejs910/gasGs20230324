<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap -->
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <!-- <link rel="stylesheet" href="/font-resize.css"> -->
    <link rel="stylesheet" href="mediaQuery.css">
    <!-- <link rel="stylesheet" href="/font-resizeheight.css"> -->

    <style>
        .navi{
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr;
            text-align: center;
        }
        .navi_left{
            font-size: 2rem;
            line-height: 4rem;
            font-weight: bold;
            border-radius: 10px;
            margin: 0.5rem;
            background-color: aliceblue;
            justify-content: center;
        }
        .fuel_name{
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }
        .price{
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #ffc107;
            margin: 0.5rem;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="row container m-3 p-1  justify-content-center">
        <div class="row col-md-1">&nbsp;</div>
        <div class="navi">
            <div class="navi_left">50,000 &nbsp;<span  style="border-left: 3px solid black"> 원</span></div>
            <div class="navi_left">43.860 &nbsp;<span style="border-left: 3px solid black"> 리터</span></div>
            <div class="disel">
                <div class="navi_right fuel_name">경유</div>
                <div class="navi_right price" >1,340</div>
            </div>
            <div class="gas">
                <div class="navi_right fuel_name">휘발유</div>
                <div class="navi_right price" >1,400</div>
            </div>
            <div class="premium_gas">
                <div class="navi_right fuel_name">고급휘발유</div>
                <div class="navi_right price" >1,580</div>
            </div>
        </div>
        <div class="contents row text-center m-1 contents_bg">

            <div id="fade1"
                class=" col-md-3 offset-md-9 mt-2 h1  bg-danger pt-2 pb-2 text-light bg-gradient rounded-3">
                영수증</div>

            <div class="w-1oo"></div>
            <div class="innercontent col-md-8 offset-md-4 display-4 text-start text fw-bold">
                <span class="sk">SK 주유소 입니다</span> <br>
                주유를 하시려면<br>시작버튼을 눌러주세요
            </div>

            <div class="w-1oo"></div>
            <div id="fade2"
                class=" col-md-3 offset-md-9  mb-5 pt-2 pb-2 h1 text-light bg-success bg-gradient rounded-3" onclick="go_next(0)">
                시 작</div>

        </div>
        <div class="row col-md-1">&nbsp;</div>
        <!-- <img src="/img/skLog.svg" class="start-slide__img" alt=""> -->
    </div>
    <!-- bootstrap -->
    <script src="bootstrap/bootstrap.bundle.min.js"></script>
    <!-- sweetalert -->
    <script src="sweetalert2.js"></script>
    <!-- js -->
    <script src="script.js"></script>
</body>


<style>
    * {
        font-family: "pretendard", 'Roboto', sans-serif, Arial, Helvetica;
    }


    body {
        margin: 0;
        padding: 0;
        height: 100vh;      
        width: 100vw;
        display: flex;
        place-items: center;
        justify-content: center;
        align-items: center;
    }

    .container,
    .navi {
        border: solid 2px black;
        max-width: 1280px;
        background-color: rgb(75, 75, 83);
    }



    .contents {
        background-color: aliceblue;
    }

    .sk {
        color: tomato;
    }



    
</style>

</html>
